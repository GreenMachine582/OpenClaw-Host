# config/policies/allowlist.yml
# Defines what the agent is permitted to do at runtime.
# Anything not explicitly listed here is denied by default.

commands:
  - git
  - pytest
  - npm test
  - npm run lint
  - cargo test
  - make test
  - make lint

paths:
  - sandboxes/repos/
  - storage/workspace/
  - storage/sessions/

external:
  - api.anthropic.com
  - api.github.com
  - discord.com/api
  - gateway.discord.gg

file_extensions:
  - .py
  - .js
  - .ts
  - .go
  - .rs
  - .md
  - .yml
  - .yaml
  - .json
  - .toml
  - .env.example
