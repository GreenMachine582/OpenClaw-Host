services:

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    env_file:
      - integrations/anthropic/.env
      - integrations/github/.env
    volumes:
      - ./config:/app/config:ro
      - ./prompts:/app/prompts:ro
      - ./integrations:/app/integrations:ro
      - ./sandboxes:/app/sandboxes
      - ./storage:/app/storage
    networks:
      - openclaw-net

  openclaw-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw:latest
    container_name: openclaw-cli
    profiles:
      - cli
    env_file:
      - integrations/anthropic/.env
      - integrations/github/.env
    volumes:
      - ./config:/app/config:ro
      - ./prompts:/app/prompts:ro
      - ./integrations:/app/integrations:ro
      - ./sandboxes:/app/sandboxes
      - ./storage:/app/storage
    networks:
      - openclaw-net
    entrypoint: ["/bin/sh"]
    stdin_open: true
    tty: true

networks:
  openclaw-net:
    driver: bridge
